  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    // Carregar serviço com cache bust
    const { default: ImoveisService } = await import('../dados/imoveis.js?v=' + Date.now());

    const container = document.getElementById("cards");

    // 1. Buscar dados do Supabase (apenas ativos)
    const rawData = await ImoveisService.getFilter({ ativo: true });

    // 2. Mapear para o formato que o HTML espera
    const produtos = rawData.map(p => ({
      nome: p.titulo,
      descricao: p.subtitulo,
      imagem: p.imagem_url,
      botoes: p.links || []
    }));

    produtos.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
      <div class="image">
        <img src="${item.imagem}" alt="${item.nome}">
      </div>
      <div class="content">
        <h3>${item.nome}</h3>
        <p>${item.descricao}</p>
        <div class="buttons">
          ${item.botoes.map(btn => `
            <a href="${btn.url || btn.link}" target="_blank">${btn.texto}</a>
          `).join("")}
        </div>
      </div>
    `;

      container.appendChild(card);
    });
  </script>
